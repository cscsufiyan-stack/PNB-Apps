<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cotitlever, user-scalable=no, maximum-scale=1.0, shrink-to-fit=no">
  <title>PNB Shoaib CSC | Mobile Complete Manager</title>
  <link rel="manifest" href="/PNB-Apps/manifest.json">
<meta name="theme-color" content="#8A1538">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      overflow-x: hidden;
      transition: background 0.3s ease;
    }

    body.dark-mode {
      background: #121212;
    }

    /* MAIN CONTAINER — mobile-first perfect centering */
    .app-container {
  width: 100%;
  max-width: 100%;
  margin: 0;
      background: #f8fafd;
      min-height: 100vh;
      position: relative;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.08);
      padding-bottom: 80px;
      transition: background 0.3s ease;
      overflow-x: hidden;
    }

    /* dark mode overrides */
    body.dark-mode .app-container {
      background: #1e1e2f;
    }

    body.dark-mode .services-section,
    body.dark-mode .search-card,
    body.dark-mode .customer-item,
    body.dark-mode .stat-chip,
    body.dark-mode .stat-premium-card,
    body.dark-mode .modal-content,
    body.dark-mode .service-filter-chip,
    body.dark-mode .service-card {
      background: #2a2a3a;
      border-color: #3a3a4a;
      color: #e0e0e0;
    }

    body.dark-mode .section-title,
    body.dark-mode .name,
    body.dark-mode .detail-line,
    body.dark-mode .stat-premium-label,
    body.dark-mode .stat-premium-value {
      color: #f0f0f0;
    }

    body.dark-mode .search-flex {
      background: #3a3a4a;
    }

    body.dark-mode .search-flex input {
      color: white;
    }

    body.dark-mode .number-value {
      background: #3a3a4a;
      color: #f0f0f0;
    }

    body.dark-mode .action-btn {
      background: #3a3a4a;
      color: #e0e0e0;
    }

    body.dark-mode .bottom-tab {
      background: rgba(30, 30, 47, 0.96);
      border-top-color: #3a3a4a;
    }

    body.dark-mode .tab-btn {
      color: #aaa;
    }

    body.dark-mode .tab-btn.active {
      color: #8A1538;
      background: rgba(138, 21, 56, 0.2);
    }

    body.dark-mode .fab-tab {
      background: #8A1538;
    }

    body.dark-mode .service-filter-chip {
      background: #3a3a4a;
      color: #e0e0e0;
    }

    body.dark-mode .service-filter-chip.active {
      background: #8A1538;
      color: white;
    }

    body.dark-mode .form-control {
      background: #3a3a4a;
      border-color: #4a4a5a;
      color: white;
    }

    /* header */
    .app-header {
      background: linear-gradient(135deg, #8A1538 0%, #5e0e2a 100%);
      padding: 18px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-logo {
      height: 70px;
      width: auto;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.2));
    }

    .main-title {
      color: white;
      font-weight: 800;
    font-size: 1.2rem;
      margin: 0;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }

    .dark-mode-toggle {
      background: rgba(255, 255, 255, 0.2);
      width: 42px;
      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
      border: none;
    }

    /* sections */
   .services-section{
  position:relative;
  background:#fff;
  margin:16px;
  border-radius:30px;
  padding:18px 14px 20px;
  overflow:hidden;
  border:2px solid #f1e3e8;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

/* top dots */
.services-section::before{
  content:'';
  position:absolute;
  top:10px;
  right:14px;
  width:110px;
  height:60px;
  background-image:radial-gradient(#d68aa8 1.5px, transparent 1.5px);
  background-size:10px 10px;
  opacity:.5;
}

/* bottom curve */
.services-section::after{
  content:'';
  position:absolute;
  right:-80px;
bottom:-110px;
width:180px;
height:180px;
  background:linear-gradient(135deg,#8A1538,#d10f5a);
  border-radius:50%;
  opacity:.95;
  box-shadow:inset 0 0 0 6px rgba(255,255,255,0.15);
  z-index:0;
pointer-events:none;
}
    /* search */
   

    /* PREMIUM SEARCH */

.search-card{
  background:transparent;
  margin:0 10px 18px;
  padding:0;
  position:relative;
}

.search-flex{
  position:relative;
  background:#fff;
    border-radius:60px;
padding:10px 72px 10px 72px;
  display:flex;
  align-items:center;
 border:3px solid #d7b27a;
min-height:78px;
  box-shadow:
    0 6px 18px rgba(138,21,56,0.08),
    inset 0 2px 10px rgba(255,255,255,0.9);
  overflow:hidden;
}

.search-flex::before{
  content:'';
  position:absolute;
  inset:8px;
  border-radius:40px;
  border:1px solid #f3d7e2;
  pointer-events:none;
}

/* YAHA NICHE PASTE KARO */

.search-flex::after{
  content:'';
  position:absolute;
 right:-70px;
bottom:-70px;
width:120px;
height:120px;
  background:linear-gradient(135deg,#8A1538,#d11c67);
  border-radius:50%;
 opacity:.08;
}

.services-grid{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(3,1fr);
gap:12px;
}

.service-card{
  background:#fff;
  border-radius:24px;
  padding:20px 8px;
  text-align:center;
  border:1px solid #ececec;
  box-shadow:0 3px 10px rgba(0,0,0,0.04);
  transition:0.25s ease;
  position:relative;
  z-index:2;
  gap:8px;

  min-height:115px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
.service-card:active{
  transform:scale(0.96);
}
    .service-filters{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:8px 2px 14px;
  padding-bottom:4px;
  scrollbar-width:none;
}

.service-filters::-webkit-scrollbar{
  display:none;
}

.service-filter-chip{
  min-width:120px;
  height:56px;
  border-radius:30px;
  background:#f3f5f9;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:0 18px;
  font-size:0.95rem;
  font-weight:700;
  color:#4b5563;
  border:none;
  flex-shrink:0;
  transition:.25s ease;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  white-space:nowrap;
}

.service-filter-chip i{
  font-size:1.1rem;
}

.service-filter-chip.active{
  background:linear-gradient(135deg,#8A1538,#b01252);
  color:#fff;
  box-shadow:0 8px 18px rgba(138,21,56,0.25);
}
    /* customer card */
   .customer-item{
  position:relative;
  background:#fff;
  margin:10px 0;
  border-radius:28px;
  padding:10px;
  overflow:hidden;
  border:3px solid #8A1538;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.customer-item::before{
  content:'';
  position:absolute;
  top:-60px;
  right:-60px;
  width:180px;
  height:180px;
  background:linear-gradient(135deg,#8A1538,#c2185b);
  border-radius:50%;
  opacity:.08;
}

.customer-item::after{
  content:'';
  position:absolute;
  bottom:-60px;
  left:-60px;
  width:180px;
  height:180px;
  background:linear-gradient(135deg,#8A1538,#c2185b);
  border-radius:50%;
  opacity:.08;
}

    .customer-info {
  flex: 1;
  min-width: 0;
}

.details-row {
  width: 100%;
}

.detail-line{
  display:flex;
  align-items:center;
  background:#fff;
  border:1px solid #e5c48d;
  border-radius:14px;
  margin-bottom:10px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  min-height:50px;
}

.detail-line span{
white-space:nowrap;
}

   

 .detail-line i{
  width:42px;
  height:42px;
  background:linear-gradient(135deg,#8A1538,#b01252);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:17px;
  flex-shrink:0;
  position:relative;
}

.detail-line i::after{
  content:'';
  position:absolute;
  right:-8px;
  top:0;
  border-top:21px solid transparent;
  border-bottom:21px solid transparent;
  border-left:8px solid #8A1538;
}
 .detail-line b{
  color:#8A1538;
  min-width:72px;
  display:inline-block;
  font-size:12px;
  font-weight:700;
 margin-left:16px;
  white-space:nowrap;
  flex-shrink:0;
   position:relative;
z-index:2;
}
    .detail-line{
  min-height:60px;
}

.number-value{
  font-family:inherit;
  font-weight:800;
  font-size:1.02rem;
  background:transparent;
padding:0 4px;
  border-radius:0;
  display:inline-block;
  white-space:nowrap;
  color:#111;
  letter-spacing:0.4px;
}
    

    .name {
      font-size: 1rem !important;
      font-weight: 800 !important;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .service-badge {
      font-size: 0.6rem;
      background: #8A1538;
      color: white;
      padding: 3px 10px;
      border-radius: 30px;
    }

   .action-btn {
width: 36px;
height: 36px;
 border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
     flex-direction: column;
gap: 0px;

font-size: 14px;
  background: #f8f9fc;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  
margin-left: 5px;
  cursor: pointer;
  text-decoration: none;
     transition: 0.2s ease;
}
    .action-btn:active{
transform: scale(0.92);
}

.edit-item {
  color: #a0004d;
}

.copy-item {
  color: #2196f3;
}

a[href*="wa.me"] {
  color: #25D366;
}

a[href^="tel"] {
  color: #4CAF50;
}

.delete-item {
  color: #ff2d2d;
}

/* PREMIUM BOTTOM NAV */

.bottom-tab{
  position:fixed;
  bottom:12px;
  left:10px;
  right:10px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(18px);
  border-radius:34px;
  padding:10px 12px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.08),
    inset 0 1px 4px rgba(255,255,255,0.8);
  border:1px solid rgba(255,255,255,0.8);
  z-index:9999;
}

.tab-btn{
  background:none;
  border:none;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  color:#7b8190;
  font-size:0.78rem;
  font-weight:600;
  flex:1;
  position:relative;
  transition:0.25s ease;
}

.tab-btn i{
 font-size:1.3rem;
}

.tab-btn.active{
  color:#8A1538;
}

.tab-btn.active::after{
  content:'';
  width:10px;
  height:10px;
  border-radius:50%;
  background:#8A1538;
  position:absolute;
  bottom:-6px;
}

.fab-tab{
  width:82px;
  height:82px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#8A1538,#c2185b);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin-top:-45px;
  box-shadow:
    0 10px 25px rgba(138,21,56,0.35),
    0 0 0 8px rgba(255,255,255,0.9);
  position:relative;
  z-index:5;
}

.fab-tab i{
  font-size:2rem;
  margin-bottom:2px;
}

.fab-tab span{
  font-size:0.82rem;
  font-weight:700;
}

   

    .page {
      display: none;
      padding: 8px 0 20px;
      animation: fadeIn 0.25s ease;
    }

    .active-page {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* analytics */
    .analytics-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-premium-card {
      background: white;
      border-radius: 28px;
      padding: 16px;
      border-left: 4px solid #8A1538;
    }

    .stat-premium-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #8A1538;
      line-height: 1.2;
    }

    .progress-bar-custom {
      height: 8px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      background: #8A1538;
      height: 100%;
      width: 0%;
    }

    .chart-container {
      height: 180px;
      margin: 10px 0;
    }

    .no-results {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
    }

    /* modals */
    .modal-content {
      border-radius: 32px;
      border: none;
    }

    .modal-header {
      background: #8A1538;
      color: white;
      border-radius: 32px 32px 0 0;
      border: none;
      padding: 16px;
    }

    .btn-pnb {
      background: #8A1538;
      color: white;
      border-radius: 40px;
      padding: 12px;
      font-weight: 700;
      width: 100%;
      border: none;
    }

    .form-control {
      border-radius: 20px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
      margin-bottom: 12px;
    }

    .version-text {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }

    /* responsive polish */
@media (max-width: 480px) {

  .app-header {
  padding: 12px;
  }

  .header-logo {
  height: 70px;
  }

  .main-title {
  font-size: 1.2rem;
  }
.search-flex{
  min-height:68px;
  padding:8px 62px 8px 58px;
}

.search-flex i{
  font-size:1.3rem;
  position:absolute;
  left:22px;
  top:50%;
transform:translateY(-50%);
  z-index:2;
}

.search-flex input{
  border:none;
  background:transparent;
  outline:none;
  width:100%;
  min-width:0;
  font-size:1rem;
  color:#444;
  font-weight:600;
}

.clear-search{
  position:absolute;
  right:10px;
  width:58px;
  height:58px;
  border-radius:50%;
  border:none;
  background:linear-gradient(135deg,#8A1538,#d10f5a);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
  z-index:3;
  box-shadow:0 6px 16px rgba(138,21,56,0.25);
}
.section-title{
 font-size:0.8rem;
  font-weight:700;
}
  .services-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .service-card {
    min-height: 105px;
    padding: 14px 6px;
    border-radius: 20px;
  }

  .service-card i {
  font-size: 26px;
  color:#8A1538;
  margin-bottom:10px;
}

  .service-card span {
    font-size: 0.82rem;
    font-weight: 600;
    display:block;
line-height:1.1;
  }

  
  .detail-line{
  min-height:50px;
}

.detail-line i{
  width:36px;
  height:36px;
  font-size:15px;
}

.detail-line i::after{
  border-top:18px solid transparent;
  border-bottom:18px solid transparent;
  border-left:7px solid #8A1538;
  right:-7px;
}

.detail-line b{
 min-width:82px;
  font-size:11px;
margin-left:12px;
}

.number-value{
  font-size:0.88rem;
  font-weight:800;
  letter-spacing:0.2px;
  padding:0 3px;
}
.detail-line span{
  font-size:0.82rem;
  font-weight:600;
}

/* MOBILE BOTTOM NAV FIX */

.bottom-tab{
  left:8px;
  right:8px;
  bottom:8px;
padding:8px 6px 14px;
  border-radius:26px;

  max-width:500px;
margin:auto;
}

.tab-btn{
  font-size:0.68rem;
  gap:2px;
}

.tab-btn i{
  font-size:1.3rem;
}

.fab-tab{
  width:64px;
  height:64px;
  margin-top:-32px;
}

.fab-tab i{
  font-size:1.6rem;
}

.fab-tab span{
  font-size:0.72rem;
}

.tab-btn.active::after{
  width:8px;
  height:8px;
  bottom:-4px;
}
  .swal-premium{
  border-radius:28px !important;
}

}
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <div class="header-row">
      <div class="logo-area"><img src="https://iili.io/ByhRUHg.png" class="header-logo" alt="PNB Logo"></div>
      <div class="title-area"><div class="main-title">PNB Shoaib CSC</div></div>
      <button class="dark-mode-toggle" id="darkModeToggleBtn"><i class="fas fa-moon"></i></button>
    </div>
  </div>

  <div id="homePage" class="page active-page">
    <div class="stats-scroll" id="statsChips"></div>
    <div class="services-section">
      <div class="section-title"><i class="fas fa-bolt" style="color:#8A1538;"></i> CSC Express Services</div>
      <div class="services-grid" id="servicesGrid"></div>
    </div>
    <div class="search-card">
      <div class="search-flex"><i class="fas fa-search" style="color:#8A1538;"></i><input type="text" id="homeSearchInput" placeholder="Search by name, mobile, aadhaar..."><button class="clear-search" id="clearHomeSearch"><i class="fas fa-times"></i></button></div>
      <div id="customerListContainer" style="max-height: 45vh; overflow-y: auto; margin-top: 12px;"></div>
    </div>
  </div>

  <div id="allPage" class="page">
    <div class="search-card">
      <div class="search-flex"><i class="fas fa-filter"></i><input type="text" id="allSearchInput" placeholder="Search any record..."><button class="clear-search" id="clearAllSearch"><i class="fas fa-times"></i></button></div>
      <div class="service-filters" id="serviceFilterContainer"></div>
      <div id="allCustomersList" style="margin-top: 14px; max-height: 55vh; overflow-y: auto;"></div>
    </div>
  </div>

  <div id="statsPage" class="page">
    <div class="services-section" style="background: transparent; box-shadow: none; padding: 12px;">
      <div id="analyticsDashboard" class="analytics-grid"></div>
    </div>
  </div>

  <div id="profilePage" class="page">
    <div class="services-section text-center">
      <i class="fas fa-user-shield" style="font-size: 70px; color:#8A1538;"></i>
      <h5 id="userEmailProfile" class="mt-2">admin@pnb.com</h5>
      <button class="btn btn-outline-danger w-100 mt-3 rounded-pill" id="logoutBtnMobile"><i class="fas fa-sign-out-alt"></i> Logout</button>
      <button class="btn btn-pnb mt-2" id="backupOpenBtn"><i class="fas fa-database"></i> Backup / Restore</button>
      <div class="version-text">
        <i class="fas fa-code-branch"></i> App Version 2.0<br>
        <div class="credit-text">Power By Mohd Sufiyan</div>
        <small>© 2026 PNB Shoaib CSC | All rights reserved</small>
      </div>
    </div>
  </div>

  <div class="bottom-tab">
    <button class="tab-btn active" data-tab="home"><i class="fas fa-home"></i><span>Home</span></button>
    <button class="tab-btn" data-tab="all"><i class="fas fa-list-ul"></i><span>All</span></button>
    <button class="fab-tab" id="fabCenterAdd"><i class="fas fa-plus"></i><span>Add</span></button>
    <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-simple"></i><span>Stats</span></button>
    <button class="tab-btn" data-tab="profile"><i class="fas fa-user"></i><span>Profile</span></button>

      const fields = [item.name, item.fatherName, item.father, item.mobile, item.aadhar, item.aadNumber, item.account, item.accountNum, item.panNo, item.pfNo, item.applicationNo];

    function formatAccount(acc) { if(!acc) return null; const c=String(acc).replace(/\s/g,''); const g=c.match(/.{1,4}/g); return g?g.join(' '):c; }

    function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, m =>
    m === '&' ? '&amp;' :
    m === '<' ? '&lt;' : '&gt;'
  );
}
    async function editRecord(id, type, collection) {

  const doc = await db.collection(collection).doc(id).get();

  if(!doc.exists) return alert("Not found");

  const data = doc.data();

  if (type === 'pnb_account') {
        document.getElementById('editPnbId').value = id;
        document.getElementById('fullName').value = data.name || '';
        document.getElementById('fatherName').value = data.fatherName || '';
        document.getElementById('mobileNum').value = data.mobile || '';
        document.getElementById('aadharNum').value = data.aadhar || '';
        document.getElementById('accountNum').value = data.account || '';
        document.getElementById('accPassword').value = data.password || '';
        new bootstrap.Modal(document.getElementById('pnbAccountFullModal')).show();
      } else {
        const modal = new bootstrap.Modal(document.getElementById('editGenericModal'));
        document.getElementById('editDocId').value = id;
        document.getElementById('editDocType').value = type;
        document.getElementById('editModalTitle').innerHTML = `<i class="fas fa-edit"></i> Edit ${type.toUpperCase()}`;
        let fieldsHtml = `<input type="text" class="form-control" placeholder="Name" id="edit_name" value="${escapeHtml(data.name || '')}" required>
          <input type="text" class="form-control" placeholder="Father" id="edit_father" value="${escapeHtml(data.fatherName || data.father || '')}">
          <input type="tel" class="form-control" placeholder="Mobile" id="edit_mobile" value="${escapeHtml(data.mobile || '')}" required>`;
        if (type === 'aadhaar') fieldsHtml += `<input type="text" class="form-control" placeholder="Aadhar Number" id="edit_aadhar" value="${escapeHtml(data.aadhar || data.aadNumber || '')}" required>`;
        else if (type === 'pan') fieldsHtml += `<input type="text" class="form-control" placeholder="PAN Application No" id="edit_panNo" value="${escapeHtml(data.panNo || '')}" required>`;
        else if (type === 'epfo') fieldsHtml += `<input type="text" class="form-control" placeholder="EPFO Number" id="edit_pfNo" value="${escapeHtml(data.pfNo || '')}" required>`;
        else fieldsHtml += `<input type="text" class="form-control" placeholder="Application No" id="edit_appNo" value="${escapeHtml(data.applicationNo || '')}" required>`;
        fieldsHtml += `<input type="text" class="form-control" placeholder="Password" id="edit_password" value="${escapeHtml(data.password || '')}">`;
        document.getElementById('editFormFields').innerHTML = fieldsHtml;
        modal.show();
      }
    }

      title: 'Delete permanently?',

   document.getElementById('restoreBackupNow').onclick = () => {

  let file = document.getElementById('restoreFile').files[0];
  if(!file) return;

  let r = new FileReader();

  r.onload = async (e) => {

    let items = JSON.parse(e.target.result);

    for(let it of items){

      let col =
        it.collection === 'customers'
        ? 'customers'
        : 'applications';

      delete it.collection;

      await db.collection(col)
        .doc(it.id)
        .set(it);
    }

  Swal.fire({
  icon:'success',
  title:'Restore successful!',
  text:'Backup restored successfully.',
  confirmButtonText:'OK',
  confirmButtonColor:'#8A1538',
  customClass:{
    popup:'swal-premium'
  }
});

fetchAll();

  };

  r.readAsText(file);

};
